<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGUF Model Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!--For running in offline mode, resources need to be in their specified paths-->
    <!--<link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">
    <script src="{{ url_for('static', filename='js/tailwindcss-3-4-17-17.js') }}"></script>
    <script src="{{ url_for('static', filename='js/socket.io.js') }}"></script>-->

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 2s linear infinite;
        }
        .console-output {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-brain text-indigo-600 mr-3"></i>
                GGUF Model Manager
            </h1>
            <p class="text-gray-600">Manage and load your GGUF models with llama.cpp server</p>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Panel - Model List -->
            <div class="lg:col-span-1">
                <div class="glass-effect rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">
                            <i class="fas fa-list mr-2"></i>Available Models
                        </h2>
                        <button onclick="openAddModelModal()" class="bg-indigo-600 text-white px-3 py-1 rounded-lg hover:bg-indigo-700 transition">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div id="modelList" class="space-y-2 max-h-96 overflow-y-auto">
                        <!-- Models will be populated here -->
                    </div>
                </div>

                <!-- Server Status -->
                <div class="glass-effect rounded-xl shadow-lg p-6 mt-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">
                        <i class="fas fa-server mr-2"></i>Server Status
                    </h2>
                    <div id="serverStatus" class="flex items-center">
                        <div class="w-3 h-3 bg-gray-400 rounded-full mr-3"></div>
                        <span class="text-gray-600">Checking...</span>
                    </div>
                    <div class="mt-4 space-y-2">
                        <button id="loadBtn" onclick="loadModel()" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition disabled:opacity-50" disabled>
                            <i class="fas fa-play mr-2"></i>Load Model
                        </button>
                        <button id="unloadBtn" onclick="unloadModel()" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition disabled:opacity-50" disabled>
                            <i class="fas fa-stop mr-2"></i>Unload Model
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Model Config & Console -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Model Configuration -->
                <div class="glass-effect rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">
                        <i class="fas fa-cog mr-2"></i>Model Configuration
                    </h2>
                    <div id="configPanel" class="text-gray-500 text-center py-8">
                        <i class="fas fa-mouse-pointer text-4xl mb-3"></i>
                        <p>Select a model from the list to view/edit configuration</p>
                    </div>
                    <div id="configForm" class="hidden space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Model Name</label>
                                <input type="text" id="editModelName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">GGUF File Path</label>
                                <input type="text" id="editPath" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">GPU Layers</label>
                                <input type="number" id="editGpuLayers" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Context Size</label>
                                <input type="number" id="editCtx" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Generate Tokens</label>
                                <input type="number" id="editGenTokens" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">MMProj Path (Optional)</label>
                                <input type="text" id="editMmproj" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="/path/to/mmproj.gguf">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Custom Flags (Optional)</label>
                                <input type="text" id="editCustomFlags" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="--temperature 0.7 --top-p 0.9">
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="saveConfig()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                                <i class="fas fa-save mr-2"></i>Save Changes
                            </button>
                            <button onclick="deleteModel()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">
                                <i class="fas fa-trash mr-2"></i>Delete Model
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Console Output -->
                <div class="glass-effect rounded-xl shadow-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">
                            <i class="fas fa-terminal mr-2"></i>Console Output
                        </h2>
                        <button onclick="clearConsole()" class="text-gray-600 hover:text-gray-800">
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>
                    <div id="loadingIndicator" class="hidden mb-4">
                        <div class="flex items-center text-indigo-600">
                            <i class="fas fa-spinner animate-spin-slow mr-3"></i>
                            <span>Loading model... Please wait</span>
                        </div>
                    </div>
                    <div id="consoleOutput" class="console-output rounded-lg p-4 h-64 overflow-y-auto text-sm">
                        <div class="text-gray-400">Console output will appear here...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Model Modal -->
    <div id="addModelModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-xl font-semibold mb-4">Add New Model</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Model Name</label>
                    <input type="text" id="newModelName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">GGUF File Path</label>
                    <input type="text" id="newPath" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">GPU Layers</label>
                        <input type="number" id="newGpuLayers" value="-1" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Context</label>
                        <input type="number" id="newCtx" value="8192" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tokens</label>
                        <input type="number" id="newGenTokens" value="4096" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">MMProj Path (Optional)</label>
                        <input type="text" id="newMmproj" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="/path/to/mmproj.gguf">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Custom Flags (Optional)</label>
                        <input type="text" id="newCustomFlags" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="--temperature 0.7 --top-p 0.9">
                    </div>
                </div>
            </div>
            <div class="flex justify-end space-x-2 mt-6">
                <button onclick="closeAddModelModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button onclick="addModel()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">Add Model</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let selectedModel = null;
        let models = [];

        // Socket.io event handlers
        socket.on('console_output', function(data) {
            addConsoleOutput(data.data);
        });

        socket.on('loading_complete', function(data) {
            document.getElementById('loadingIndicator').classList.add('hidden');
            if (data.success) {
                addConsoleOutput(`✅ ${data.message}`, 'success');
                checkServerStatus();
            } else {
                addConsoleOutput(`❌ ${data.message}`, 'error');
            }
        });

        socket.on('model_unloaded', function(data) {
            addConsoleOutput(`✅ ${data.message}`, 'success');
            checkServerStatus();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadModels();
            checkServerStatus();
            setInterval(checkServerStatus, 5000);
        });

        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                const data = await response.json();
                models = data.models;
                renderModelList();
            } catch (error) {
                console.error('Error loading models:', error);
            }
        }

        function renderModelList() {
            const listContainer = document.getElementById('modelList');
            if (models.length === 0) {
                listContainer.innerHTML = '<div class="text-gray-500 text-center py-4">No models available</div>';
                return;
            }

            listContainer.innerHTML = models.map(model => `
                <div onclick="selectModel('${model.model_name}')" class="model-item p-3 rounded-lg border ${selectedModel === model.model_name ? 'border-indigo-500 bg-indigo-50' : 'border-gray-200 hover:border-gray-300'} cursor-pointer transition">
                    <div class="font-medium">${model.model_name}</div>
                    <div class="text-sm text-gray-500">${model.path_to_gguf_file.split('/').pop()}</div>
                </div>
            `).join('');
        }

        function selectModel(modelName) {
            selectedModel = modelName;
            renderModelList();
            const model = models.find(m => m.model_name === modelName);
            if (model) {
                document.getElementById('configPanel').classList.add('hidden');
                document.getElementById('configForm').classList.remove('hidden');
                
                document.getElementById('editModelName').value = model.model_name;
                document.getElementById('editPath').value = model.path_to_gguf_file;
                document.getElementById('editGpuLayers').value = model.n_gpu_layers;
                document.getElementById('editCtx').value = model.n_ctx;
                document.getElementById('editGenTokens').value = model.n_generate_tokens;
                document.getElementById('editMmproj').value = model.mmproj_path || '';
                document.getElementById('editCustomFlags').value = model.custom_flags || '';
                
                document.getElementById('loadBtn').disabled = false;
            }
        }

        async function loadModel() {
            if (!selectedModel) return;
            
            const model = models.find(m => m.model_name === selectedModel);
            if (!model) return;

            document.getElementById('loadingIndicator').classList.remove('hidden');
            clearConsole();
            addConsoleOutput('Starting model loading process...', 'info');

            try {
                const response = await fetch('/api/load', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        path_to_gguf_file: model.path_to_gguf_file,
                        n_gpu_layers: model.n_gpu_layers,
                        n_ctx: model.n_ctx,
                        n_generate_tokens: model.n_generate_tokens,
                        mmproj_path: model.mmproj_path || '',
                        custom_flags: model.custom_flags || ''
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    document.getElementById('loadingIndicator').classList.add('hidden');
                    addConsoleOutput(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                document.getElementById('loadingIndicator').classList.add('hidden');
                addConsoleOutput(`❌ Network error: ${error.message}`, 'error');
            }
        }

        async function unloadModel() {
            try {
                const response = await fetch('/api/unload', {
                    method: 'POST'
                });
                const data = await response.json();
                if (!response.ok) {
                    addConsoleOutput(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addConsoleOutput(`❌ Network error: ${error.message}`, 'error');
            }
        }

        async function saveConfig() {
            if (!selectedModel) return;

            const updatedModel = {
                model_name: document.getElementById('editModelName').value,
                path_to_gguf_file: document.getElementById('editPath').value,
                n_gpu_layers: parseInt(document.getElementById('editGpuLayers').value),
                n_ctx: parseInt(document.getElementById('editCtx').value),
                n_generate_tokens: parseInt(document.getElementById('editGenTokens').value),
                mmproj_path: document.getElementById('editMmproj').value,
                custom_flags: document.getElementById('editCustomFlags').value
            };

            try {
                const response = await fetch(`/api/models/${selectedModel}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(updatedModel)
                });

                const data = await response.json();
                if (response.ok) {
                    addConsoleOutput(`✅ ${data.message}`, 'success');
                    loadModels();
                    if (selectedModel !== updatedModel.model_name) {
                        selectedModel = updatedModel.model_name;
                        renderModelList();
                    }
                } else {
                    addConsoleOutput(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addConsoleOutput(`❌ Network error: ${error.message}`, 'error');
            }
        }

        async function deleteModel() {
            if (!selectedModel) return;
            
            if (!confirm(`Are you sure you want to delete "${selectedModel}"?`)) return;

            try {
                const response = await fetch(`/api/models/${selectedModel}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                if (response.ok) {
                    addConsoleOutput(`✅ ${data.message}`, 'success');
                    selectedModel = null;
                    document.getElementById('configPanel').classList.remove('hidden');
                    document.getElementById('configForm').classList.add('hidden');
                    document.getElementById('loadBtn').disabled = true;
                    loadModels();
                } else {
                    addConsoleOutput(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addConsoleOutput(`❌ Network error: ${error.message}`, 'error');
            }
        }

        function openAddModelModal() {
            document.getElementById('addModelModal').classList.remove('hidden');
        }

        function closeAddModelModal() {
            document.getElementById('addModelModal').classList.add('hidden');
            // Clear form
            document.getElementById('newModelName').value = '';
            document.getElementById('newPath').value = '';
            document.getElementById('newGpuLayers').value = '-1';
            document.getElementById('newCtx').value = '8192';
            document.getElementById('newGenTokens').value = '4096';
            document.getElementById('newMmproj').value = '';
            document.getElementById('newCustomFlags').value = '';
        }

        async function addModel() {
            const newModel = {
                model_name: document.getElementById('newModelName').value,
                path_to_gguf_file: document.getElementById('newPath').value,
                n_gpu_layers: parseInt(document.getElementById('newGpuLayers').value),
                n_ctx: parseInt(document.getElementById('newCtx').value),
                n_generate_tokens: parseInt(document.getElementById('newGenTokens').value),
                mmproj_path: document.getElementById('newMmproj').value,
                custom_flags: document.getElementById('newCustomFlags').value
            };

            // Validate
            if (!newModel.model_name || !newModel.path_to_gguf_file) {
                addConsoleOutput('❌ Please fill in all required fields', 'error');
                return;
            }

            try {
                const response = await fetch('/api/models', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(newModel)
                });

                const data = await response.json();
                if (response.ok) {
                    addConsoleOutput(`✅ ${data.message}`, 'success');
                    closeAddModelModal();
                    loadModels();
                } else {
                    addConsoleOutput(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addConsoleOutput(`❌ Network error: ${error.message}`, 'error');
            }
        }

        async function checkServerStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                updateServerStatus(data.is_loaded);
            } catch (error) {
                updateServerStatus(false);
            }
        }

        function updateServerStatus(isLoaded) {
            const statusDiv = document.getElementById('serverStatus');
            const loadBtn = document.getElementById('loadBtn');
            const unloadBtn = document.getElementById('unloadBtn');

            if (isLoaded) {
                statusDiv.innerHTML = `
                    <div class="w-3 h-3 bg-green-500 rounded-full mr-3 animate-pulse"></div>
                    <span class="text-green-600 font-medium">Server Running (Port 10000)</span>
                `;
                loadBtn.disabled = true;
                unloadBtn.disabled = false;
            } else {
                statusDiv.innerHTML = `
                    <div class="w-3 h-3 bg-gray-400 rounded-full mr-3"></div>
                    <span class="text-gray-600">Server Stopped</span>
                `;
                loadBtn.disabled = !selectedModel;
                unloadBtn.disabled = true;
            }
        }

        function addConsoleOutput(message, type = 'normal') {
            const consoleDiv = document.getElementById('consoleOutput');
            const timestamp = new Date().toLocaleTimeString();
            
            let colorClass = '';
            if (type === 'success') colorClass = 'text-green-400';
            else if (type === 'error') colorClass = 'text-red-400';
            else if (type === 'info') colorClass = 'text-blue-400';
            else colorClass = 'text-gray-300';

            const messageDiv = document.createElement('div');
            messageDiv.className = colorClass;
            messageDiv.innerHTML = `<span class="text-gray-500">[${timestamp}]</span> ${message}`;
            
            // Remove placeholder if exists
            const placeholder = consoleDiv.querySelector('.text-gray-400');
            if (placeholder) placeholder.remove();
            
            consoleDiv.appendChild(messageDiv);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function clearConsole() {
            const consoleDiv = document.getElementById('consoleOutput');
            consoleDiv.innerHTML = '<div class="text-gray-400">Console output will appear here...</div>';
        }
    </script>
</body>
</html>
